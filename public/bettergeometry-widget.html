<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BetterGeometry</title>
    <style>
      :root {
        color: #111827;
        background: transparent;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        padding: 12px;
      }

      main {
        width: 100%;
        height: calc(100vh - 24px);
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        border: 1px solid #e5e7eb;
        border-radius: 22px;
        background: radial-gradient(circle at top, #ffffff 0%, #f8fafc 70%);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        overflow: hidden;
      }

      header {
        flex: 0 0 auto;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 16px 8px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: #64748b;
        font-size: 0.68rem;
        font-weight: 850;
        letter-spacing: 0.22em;
      }

      h1 {
        margin: 0;
        color: #0f172a;
        font-size: clamp(2.2rem, 7vw, 4.4rem);
        line-height: 0.92;
        letter-spacing: -0.08em;
      }

      .subline {
        margin: 8px 0 0;
        max-width: 42rem;
        color: #475569;
        font-size: 0.92rem;
        line-height: 1.35;
      }

      .version-badge {
        flex: 0 0 auto;
        padding: 0.42rem 0.68rem;
        border-radius: 999px;
        background: #111827;
        color: white;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.76rem;
        font-weight: 850;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.22);
      }

      .scene-wrap {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        padding: 8px 16px 16px;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        background:
          linear-gradient(135deg, rgba(241,245,249,.7), rgba(255,255,255,.95)),
          #ffffff;
      }

      .shape {
        fill: rgba(147, 197, 253, 0.16);
        stroke: #334155;
        stroke-width: 0.04;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .shape.highlight {
        stroke: #2563eb;
        stroke-width: 0.08;
      }

      .shape.construction {
        stroke-dasharray: 0.16 0.12;
        opacity: 0.78;
      }

      .point {
        fill: #0f172a;
        stroke: #ffffff;
        stroke-width: 0.028;
        vector-effect: non-scaling-stroke;
      }

      text {
        fill: #0f172a;
        paint-order: stroke;
        stroke: rgba(255,255,255,.92);
        stroke-width: 0.055;
        font-size: 0.19px;
        font-weight: 850;
        dominant-baseline: middle;
        text-anchor: middle;
        pointer-events: none;
        user-select: none;
      }

      .shape-label {
        font-size: 0.17px;
        font-weight: 800;
        fill: #334155;
      }

      @media (max-width: 560px) {
        body { padding: 8px; }
        main { height: calc(100vh - 16px); border-radius: 18px; }
        header { padding: 14px 14px 6px; }
        .scene-wrap { padding: 6px 14px 14px; }
        .subline { font-size: 0.84rem; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <section>
          <p class="eyebrow">BETTERTOOLS</p>
          <h1>BetterGeometry</h1>
          <p class="subline">Generic geometry scene JSON renders as clean SVG inside ChatGPT.</p>
        </section>
        <div class="version-badge">V0.1.0.2</div>
      </header>

      <section class="scene-wrap">
        <svg id="scene" role="img" aria-label="BetterGeometry generic SVG scene"></svg>
      </section>
    </main>

    <script>
      const scene = {
        schema: "bettergeometry.scene",
        version: "0.1",
        objects: [
          { type: "point", id: "A", x: 0, y: 0, label: "A" },
          { type: "point", id: "B", x: 5, y: 0, label: "B" },
          { type: "point", id: "C", x: 4.15, y: 3.15, label: "C" },
          { type: "point", id: "D", x: 0.75, y: 3.85, label: "D" },
          { type: "point", id: "O", x: 2.55, y: 1.65, label: "O" },
          { type: "polygon", id: "ABCD", points: ["A", "B", "C", "D"], label: "Polygon ABCD" },
          { type: "segment", id: "AC", from: "A", to: "C", label: "AC" },
          { type: "circle", id: "circleO", center: "O", radius: 0.9, label: "Circle O" }
        ],
        annotations: [
          { type: "highlight", id: "highlight-ac", targetId: "AC", emphasis: "primary" }
        ],
        viewport: { padding: 0.82 }
      };

      const svg = document.getElementById("scene");
      const ns = "http://www.w3.org/2000/svg";
      const points = new Map(scene.objects.filter((object) => object.type === "point").map((point) => [point.id, point]));
      const annotations = new Map();
      for (const annotation of scene.annotations || []) {
        const ids = annotation.targetId ? [annotation.targetId] : annotation.targetIds || [];
        for (const id of ids) annotations.set(id, [...(annotations.get(id) || []), annotation]);
      }

      const y = (value) => -value;
      const highlighted = (id) => (annotations.get(id) || []).some((annotation) => annotation.type === "highlight");
      const labelFor = (object) => (annotations.get(object.id) || []).find((annotation) => annotation.type === "label")?.text || object.label;
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
      const radiusFor = (circle) => circle.radius ?? dist(points.get(circle.center), points.get(circle.through));
      const midpoint = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
      const centroid = (list) => ({ x: list.reduce((sum, point) => sum + point.x, 0) / list.length, y: list.reduce((sum, point) => sum + point.y, 0) / list.length });

      const bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
      const include = (x, yy) => {
        bounds.minX = Math.min(bounds.minX, x);
        bounds.minY = Math.min(bounds.minY, yy);
        bounds.maxX = Math.max(bounds.maxX, x);
        bounds.maxY = Math.max(bounds.maxY, yy);
      };
      for (const point of points.values()) include(point.x, point.y);
      for (const object of scene.objects) {
        if (object.type !== "circle") continue;
        const center = points.get(object.center);
        const r = radiusFor(object);
        if (!center || !r) continue;
        include(center.x - r, center.y - r);
        include(center.x + r, center.y + r);
      }
      const pad = scene.viewport?.padding ?? 1;
      bounds.minX -= pad; bounds.minY -= pad; bounds.maxX += pad; bounds.maxY += pad;
      svg.setAttribute("viewBox", `${bounds.minX} ${-bounds.maxY} ${bounds.maxX - bounds.minX} ${bounds.maxY - bounds.minY}`);

      function make(tag, attrs = {}, parent = svg) {
        const element = document.createElementNS(ns, tag);
        for (const [key, value] of Object.entries(attrs)) element.setAttribute(key, String(value));
        parent.appendChild(element);
        return element;
      }

      const shapeLayer = make("g", { class: "shape-layer" });
      const pointLayer = make("g", { class: "point-layer" });
      const labelLayer = make("g", { class: "label-layer" });

      function drawShape(object) {
        const cls = `shape ${highlighted(object.id) ? "highlight" : ""}`.trim();
        if (object.type === "polygon") {
          const pts = object.points.map((id) => points.get(id)).filter(Boolean);
          if (pts.length >= 3) make("polygon", { class: cls, points: pts.map((p) => `${p.x},${y(p.y)}`).join(" ") }, shapeLayer);
        }
        if (object.type === "segment") {
          const a = points.get(object.from), b = points.get(object.to);
          if (a && b) make("line", { class: cls, x1: a.x, y1: y(a.y), x2: b.x, y2: y(b.y) }, shapeLayer);
        }
        if (object.type === "circle") {
          const c = points.get(object.center);
          const r = radiusFor(object);
          if (c && r > 0) make("circle", { class: cls, cx: c.x, cy: y(c.y), r }, shapeLayer);
        }
      }

      function drawPoint(point) {
        make("circle", { class: "point", cx: point.x, cy: y(point.y), r: 0.072 }, pointLayer);
      }

      function drawText(x, yy, text, className = "") {
        make("text", { x, y: yy, class: className }, labelLayer).textContent = text;
      }

      function drawLabel(object) {
        const label = labelFor(object);
        if (!label) return;
        if (object.type === "point") drawText(object.x + 0.17, y(object.y) - 0.17, label);
        if (object.type === "segment") {
          const a = points.get(object.from), b = points.get(object.to);
          if (!a || !b) return;
          const mid = midpoint(a, b);
          drawText(mid.x + 0.15, y(mid.y) - 0.16, label, "shape-label");
        }
        if (object.type === "polygon") {
          const pts = object.points.map((id) => points.get(id)).filter(Boolean);
          if (pts.length < 3) return;
          const center = centroid(pts);
          drawText(center.x - 0.18, y(center.y + 0.58), label, "shape-label");
        }
        if (object.type === "circle") {
          const center = points.get(object.center);
          if (!center) return;
          const r = radiusFor(object);
          drawText(center.x + r + 0.55, y(center.y + 0.1), label, "shape-label");
        }
      }

      for (const object of scene.objects) drawShape(object);
      for (const object of scene.objects) if (object.type === "point") drawPoint(object);
      for (const object of scene.objects) drawLabel(object);
    </script>
  </body>
</html>
