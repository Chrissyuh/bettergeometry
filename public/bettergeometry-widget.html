<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetterGeometry Widget</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: transparent;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: stretch;
        padding: 12px;
      }

      .card {
        position: relative;
        width: 100%;
        height: 100%;
        max-height: 630px;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: linear-gradient(135deg, #fbfdff 0%, #ffffff 100%);
        box-shadow: 0 16px 45px rgba(15, 23, 42, 0.18);
        padding: clamp(18px, 3vw, 26px);
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 10px;
      }

      .version {
        position: absolute;
        top: 18px;
        right: 18px;
        padding: 8px 13px;
        border-radius: 999px;
        background: #0f172a;
        color: white;
        font-weight: 900;
        font-size: 14px;
        letter-spacing: 0.02em;
        box-shadow: 0 16px 35px rgba(15, 23, 42, 0.22);
      }

      .eyebrow {
        margin: 0;
        color: #64748b;
        font-weight: 900;
        letter-spacing: 0.28em;
        font-size: 13px;
      }

      h1 {
        margin: 0;
        width: calc(100% - 140px);
        font-size: clamp(40px, 7vw, 72px);
        line-height: 0.92;
        letter-spacing: -0.08em;
      }

      .subtitle {
        margin: -2px 0 4px;
        font-size: clamp(14px, 2vw, 18px);
        color: #334155;
      }

      .scene-panel {
        min-height: 0;
        width: 100%;
        border: 1px solid #d9e2ef;
        border-radius: 22px;
        background: linear-gradient(135deg, #f8fbff, #ffffff);
        overflow: hidden;
        display: grid;
        place-items: center;
        padding: 8px;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
        max-height: 390px;
      }

      .scene-bg { fill: #fbfdff; }
      .polygon-fill { fill: rgba(96, 165, 250, 0.15); }
      .polygon-stroke { fill: none; stroke: rgba(37, 99, 235, 0.42); stroke-width: 2.2; }
      .circle-fill { fill: rgba(59, 130, 246, 0.12); }
      .circle-stroke { fill: none; stroke: rgba(37, 99, 235, 0.32); stroke-width: 2; }
      .segment { stroke: rgba(37, 99, 235, 0.32); stroke-width: 2.2; }
      .point-dot { fill: #0f172a; }

      .point-label,
      .shape-label,
      .caption-label,
      .subtle-label {
        font-weight: 900;
        paint-order: stroke;
        stroke: rgba(255, 255, 255, 0.92);
        stroke-width: 4px;
        fill: #0f172a;
      }

      .point-label { font-size: 24px; }
      .shape-label { font-size: 22px; }
      .shape-label.small { font-size: 18px; }
      .caption-label { font-size: 18px; fill: #334155; }
      .subtle-label { font-size: 14px; fill: #64748b; }

      @media (max-width: 720px) {
        body { padding: 8px; }
        .card { border-radius: 22px; padding: 16px; gap: 8px; }
        h1 { font-size: 42px; width: calc(100% - 110px); }
        .version { top: 14px; right: 14px; font-size: 12px; padding: 7px 10px; }
        .scene-panel { padding: 5px; }
        svg { max-height: 310px; }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-label="BetterGeometry V0.1.0.3">
      <div class="version">V0.1.0.3</div>
      <p class="eyebrow">BETTERTOOLS</p>
      <h1>BetterGeometry</h1>
      <p class="subtitle">Generic geometry scene JSON renders as clean SVG inside ChatGPT.</p>
      <section class="scene-panel">
        <svg viewBox="0 0 720 360" role="img" aria-label="BetterGeometry generic scene renderer demo">
          <rect x="0" y="0" width="720" height="360" rx="20" class="scene-bg" />

          <polygon points="124,282 616,282 520,84 198,48" class="polygon-fill" />
          <polygon points="124,282 616,282 520,84 198,48" class="polygon-stroke" />

          <line x1="124" y1="282" x2="520" y2="84" class="segment" />

          <circle cx="360" cy="178" r="78" class="circle-fill" />
          <circle cx="360" cy="178" r="78" class="circle-stroke" />

          <text x="360" y="258" text-anchor="middle" class="shape-label">Polygon ABCD</text>
          <text x="360" y="88" text-anchor="middle" class="shape-label small">Circle O</text>
          <text x="430" y="156" text-anchor="middle" class="subtle-label">diagonal AC</text>
          <text x="360" y="136" text-anchor="middle" class="caption-label">Generic scene renderer</text>

          <circle cx="124" cy="282" r="8" class="point-dot" />
          <text x="138" y="271" class="point-label">A</text>

          <circle cx="616" cy="282" r="8" class="point-dot" />
          <text x="630" y="271" class="point-label">B</text>

          <circle cx="520" cy="84" r="8" class="point-dot" />
          <text x="534" y="74" class="point-label">C</text>

          <circle cx="198" cy="48" r="8" class="point-dot" />
          <text x="212" y="38" class="point-label">D</text>

          <circle cx="360" cy="178" r="8" class="point-dot" />
          <text x="374" y="166" class="point-label">O</text>
        </svg>
      </section>
    </main>
  </body>
</html>
